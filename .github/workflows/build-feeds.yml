name: Build feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: feed-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl, dom, libxml, simplexml
          coverage: none

      - name: Validate PHP syntax
        run: |
          find scripts -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Build feeds
        env:
          POLYCOMP_ACCOUNTS: ${{ secrets.POLYCOMP_ACCOUNTS }}
          POLYCOMP_FEEDS: ${{ secrets.POLYCOMP_FEEDS }}
        run: php scripts/build.php

      - name: Commit changed feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          if git diff --cached --quiet; then
            echo "No feed changes."
            exit 0
          fi

          git commit -m "Update feeds"
          git push
